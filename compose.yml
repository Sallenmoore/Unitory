services:
  unitory:
    build:
      context: ../inventory
    container_name: unitory
    restart: unless-stopped
    command: sh -c 'export REDIS_PASSWORD=$$(cat /run/secrets/redis.pass); exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload'
    env_file: ../inventory/.env
    environment:
      DB_HOST: mongo
      DB_PORT: "27017"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ../inventory/app:/app/app
      - ../inventory/worker:/app/worker
      - secrets:/run/secrets:ro
    depends_on:
      sops-decrypt:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - docknet
  worker:
    build:
      context: ../inventory
    container_name: unitory-worker
    restart: unless-stopped
    command: sh -c 'export REDIS_PASSWORD=$$(cat /run/secrets/redis.pass); exec /app/worker/entrypoint.sh'
    env_file: ../inventory/.env
    environment:
      DB_HOST: mongo
      DB_PORT: "27017"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ../inventory/app:/app/app
      - ../inventory/worker:/app/worker
      - secrets:/run/secrets:ro
    depends_on:
      sops-decrypt:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - docknet
