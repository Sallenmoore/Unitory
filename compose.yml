services:
  unitory:
    build:
      context: ../inventory
    container_name: unitory
    restart: unless-stopped
    command: sh -c '[ -f /run/secrets/unitory.db.pass ] && export DB_PASSWORD="$$(cat /run/secrets/unitory.db.pass)"; export REDIS_PASSWORD=$$(cat /run/secrets/redis.pass); exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload'
    env_file: ../inventory/.env
    environment:
      DB_HOST: mongo
      DB_PORT: "27017"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SESSION_SECRET_FILE: /run/secrets/unitory.session
      GOOGLE_AUTH_CLIENT_SECRET_FILE: /run/secrets/unitory.google.secret
    volumes:
      - ../inventory/app:/app/app
      - ../inventory/worker:/app/worker
      - secrets:/run/secrets:ro
    depends_on:
      sops-decrypt:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    labels:
    # traefik
      traefik.enable: "true"
    # tcp traefik router
      traefik.http.routers.unitory.rule: "Host(`unitory.bu-its.binghamton.edu`)"
      traefik.http.routers.unitory.entrypoints: "websecure"
      traefik.http.services.unitory.loadbalancer.server.port: "8000"
    # allow bluecat-api to handle cname
      bluecat.dns.enable: "true"
    # wud
      wud.watch: true
      wud.watch.digest: true
    networks:
      - docknet
  worker:
    build:
      context: ../inventory
    container_name: unitory-worker
    restart: unless-stopped
    command: sh -c '[ -f /run/secrets/unitory.db.pass ] && export DB_PASSWORD="$$(cat /run/secrets/unitory.db.pass)"; export REDIS_PASSWORD=$$(cat /run/secrets/redis.pass); exec /app/worker/entrypoint.sh'
    env_file: ../inventory/.env
    environment:
      DB_HOST: mongo
      DB_PORT: "27017"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ../inventory/app:/app/app
      - ../inventory/worker:/app/worker
      - secrets:/run/secrets:ro
    depends_on:
      sops-decrypt:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    labels:
    # wud
      wud.watch: true
      wud.watch.digest: true
    networks:
      - docknet
