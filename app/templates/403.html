{% extends "base.html" %}
{% block title %}Forbidden{% endblock %}
{% block content %}

<div class="hero-error">
  <h1>403</h1>
  <p class="lead text-muted mb-4" style="max-width: 36rem;">{{ message or "You don't have authorization to access that page." }}</p>
  <div class="d-flex gap-2 justify-content-center">
    <a href="/" class="btn btn-primary">Back to overview</a>
    {% if not request.state.user %}
      <a href="/auth/login" class="btn btn-outline-secondary">Sign in</a>
    {% endif %}
  </div>
</div>

{% endblock %}
