{% extends "base.html" %}
{% block title %}403 Forbidden{% endblock %}
{% block content %}

<section class="hero-error">
  <div class="num reveal">403</div>
  <div class="reveal reveal-1">
    <span class="lbl">RESPONSE · CHECKPOINT</span>
    <h1 style="margin: 0.4rem 0 1rem;">Hold</h1>
    <p style="font-size: 1.05rem; max-width: 38ch;">{{ message or "You don't have authorization to access that page." }}</p>
    <div class="btn-row" style="margin-top: 1.5rem;">
      <a href="/" class="btn primary">Back to manifest</a>
      {% if not request.state.user %}
        <a href="/auth/login" class="btn ghost">Sign in</a>
      {% endif %}
    </div>
  </div>
</section>

{% endblock %}
